<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
</head>

<body>
    <h1>User Login/Register</h1>

    <!-- Add User Form -->
    <form id="user-form">
        <!-- The label will be inserted dynamically above the input -->
        <input type="text" id="user-input" placeholder="Enter your name" required />
        <input type="email" id="email-input" placeholder="Enter your email" required />
        <!-- <input type="checkbox" id="register-checkbox" /> -->
        <!-- <label for="register-checkbox"> Register as new user</label> -->
        <button id="add-user" type="submit">Add User</button>
    </form>

    <p id="current-user"></p>

    <!-- Add Todo Form -->
    <form id="post-form" style="display: none;">
        <h1>Post something</h1>
        <!-- The label will be inserted dynamically above the input -->
        <input type="text" id="post-title" placeholder="Title" required />
        <textarea id="post-content" placeholder="Content" required></textarea>
        <button id="add-post" type="submit">Add Post</button>
    </form>

    <script>
        const USER_API_BASE = '/api/v1/users';
        const POST_API_BASE = '/api/v1/posts';
        const userNameInput = document.getElementById('user-input');
        const userEmailInput = document.getElementById('email-input');
        const userForm = document.getElementById('user-form');
        const postForm = document.getElementById('post-form');
        const postTitleInput = document.getElementById('post-title');
        const postContentInput = document.getElementById('post-content');

        const userButton = document.getElementById('add-user');

        let currentUser = Number(localStorage.getItem('currentUser')); // Track the current user

        document.getElementById('current-user').textContent = currentUser ? `Current User ID: ${currentUser}` : 'No user logged in.';

        !function (t, e) { var o, n, p, r; e.__SV || (window.posthog = e, e._i = [], e.init = function (i, s, a) { function g(t, e) { var o = e.split("."); 2 == o.length && (t = t[o[0]], e = o[1]), t[e] = function () { t.push([e].concat(Array.prototype.slice.call(arguments, 0))) } } (p = t.createElement("script")).type = "text/javascript", p.crossOrigin = "anonymous", p.async = !0, p.src = s.api_host.replace(".i.posthog.com", "-assets.i.posthog.com") + "/static/array.js", (r = t.getElementsByTagName("script")[0]).parentNode.insertBefore(p, r); var u = e; for (void 0 !== a ? u = e[a] = [] : a = "posthog", u.people = u.people || [], u.toString = function (t) { var e = "posthog"; return "posthog" !== a && (e += "." + a), t || (e += " (stub)"), e }, u.people.toString = function () { return u.toString(1) + ".people (stub)" }, o = "init capture register register_once register_for_session unregister unregister_for_session getFeatureFlag getFeatureFlagPayload isFeatureEnabled reloadFeatureFlags updateEarlyAccessFeatureEnrollment getEarlyAccessFeatures on onFeatureFlags onSessionId getSurveys getActiveMatchingSurveys renderSurvey canRenderSurvey identify setPersonProperties group resetGroups setPersonPropertiesForFlags resetPersonPropertiesForFlags setGroupPropertiesForFlags resetGroupPropertiesForFlags reset get_distinct_id getGroups get_session_id get_session_replay_url alias set_config startSessionRecording stopSessionRecording sessionRecordingStarted captureException loadToolbar get_property getSessionProperty createPersonProfile opt_in_capturing opt_out_capturing has_opted_in_capturing has_opted_out_capturing clear_opt_in_out_capturing debug getPageViewId captureTraceFeedback captureTraceMetric".split(" "), n = 0; n < o.length; n++)g(u, o[n]); e._i.push([i, s, a]) }, e.__SV = 1) }(document, window.posthog || []);
        posthog.init('phc_scuT8Ch2g2hNaxJeJMyhipRNEwvuN5sVebwrnD6eU56b', {
            api_host: 'https://eu.i.posthog.com',
            person_profiles: 'identified_only' // or 'always' to create profiles for anonymous users as well
        });

        posthog.onFeatureFlags(function () {
            // feature flags should be available at this point
            if (posthog.isFeatureEnabled('is-post-creation-enabled')) {
                postForm.style.display = 'block';
            } else {
                postForm.style.display = 'none';
            }
            if (posthog.getFeatureFlag('experiment-user-button-style') === 'test') {
                userButton.style.backgroundColor = 'blue';
            } else {
                userButton.style.backgroundColor = 'green';
            }
        });

        // Create a new user (POST)
        async function createUser(formData) {
            try {
                const response = await fetch(USER_API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-POSTHOG-DISTINCT-ID': currentUser || posthog.get_distinct_id(), // Use current user or PostHog distinct ID for tracking
                        'X-POSTHOG-SESSION-ID': posthog.get_session_id()
                    },
                    body: JSON.stringify(formData)
                });
                if (!response.ok) {
                    const { error } = await response.json();
                    alert(error);
                }
                const userData = await response.json();
                currentUser = userData.user.id; // Store the created user
                localStorage.setItem('currentUser', currentUser); // Store user in localStorage for persistence
            } catch (error) {
                console.error('Error creating user:', error);
            }
        }

        // Create a new Post (POST)
        async function createPost(formData) {
            try {
                const response = await fetch(POST_API_BASE, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-POSTHOG-DISTINCT-ID': currentUser || posthog.get_distinct_id(), // Use current user or PostHog distinct ID for tracking
                        'X-POSTHOG-SESSION-ID': posthog.get_session_id()
                    },
                    body: JSON.stringify(formData)
                });
                if (!response.ok) {
                    const { error } = await response.json();
                    alert(error);
                }
            } catch (error) {
                console.error('Error creating post:', error);
            }
        }
        // Login user (GET)
        // async function loginUser(email) {
        //     try {
        //         const response = await fetch(`${USER_API_BASE}/login`, {
        //             method: 'POST',
        //             headers: { 'Content-Type': 'application/json' },
        //             body: JSON.stringify({ email })
        //         });
        //         if (!response.ok) {
        //             const { error } = await response.json();
        //             alert(error);
        //         }
        //         const userData = await response.json();
        //         currentUser = userData.id; // Store the created user
        //         localStorage.setItem('currentUser', currentUser); // Store user in localStorage for persistence
        //     } catch (error) {
        //         console.error('Error creating user:', error);
        //     }
        // }

        // Handle form submission to create a new user
        // the events are tracked by default and categorized by variants
        userForm.addEventListener('submit', event => {
            event.preventDefault();
            const name = userNameInput.value;
            const email = userEmailInput.value;
            if (name && email) {
                createUser({ name, email });
            }
        });

        postForm.addEventListener('submit', event => {
            event.preventDefault();
            const title = postTitleInput.value;
            const content = postContentInput.value;
            const userId = currentUser;
            if (title && userId) {
                createPost({ title, content, userId });
            }
        });

    </script>
</body>

</html>
